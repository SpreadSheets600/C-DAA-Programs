<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#41d1ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bd34fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#41d1ff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#bd34fe;stop-opacity:0.15" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#grad2)" stroke="url(#grad1)" stroke-width="1.5" opacity="0.6"/>

  <!-- Tree edges -->
  <!-- Root to left child -->
  <line x1="100" y1="52" x2="62" y2="95" stroke="url(#grad1)" stroke-width="1.5" opacity="0.5"/>
  <!-- Root to right child -->
  <line x1="100" y1="52" x2="138" y2="95" stroke="url(#grad1)" stroke-width="1.5" opacity="0.5"/>
  <!-- Left child to its children -->
  <line x1="62" y1="95" x2="42" y2="138" stroke="url(#grad1)" stroke-width="1.5" opacity="0.4"/>
  <line x1="62" y1="95" x2="82" y2="138" stroke="url(#grad1)" stroke-width="1.5" opacity="0.4"/>
  <!-- Right child to its children -->
  <line x1="138" y1="95" x2="118" y2="138" stroke="url(#grad1)" stroke-width="1.5" opacity="0.4"/>
  <line x1="138" y1="95" x2="158" y2="138" stroke="url(#grad1)" stroke-width="1.5" opacity="0.4"/>

  <!-- Root node (highlighted / active) -->
  <circle cx="100" cy="46" r="16" fill="url(#grad1)" opacity="0.2" filter="url(#glow)"/>
  <circle cx="100" cy="46" r="12" fill="#1a1a2e" stroke="url(#grad1)" stroke-width="2" filter="url(#glow)"/>
  <text x="100" y="51" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="url(#grad1)">7</text>

  <!-- Level 2 nodes -->
  <!-- Left child -->
  <circle cx="62" cy="95" r="12" fill="#1a1a2e" stroke="#41d1ff" stroke-width="1.5" opacity="0.8"/>
  <text x="62" y="100" text-anchor="middle" font-family="monospace" font-size="10" font-weight="600" fill="#41d1ff" opacity="0.8">3</text>
  <!-- Right child -->
  <circle cx="138" cy="95" r="12" fill="#1a1a2e" stroke="#bd34fe" stroke-width="1.5" opacity="0.8"/>
  <text x="138" y="100" text-anchor="middle" font-family="monospace" font-size="10" font-weight="600" fill="#bd34fe" opacity="0.8">11</text>

  <!-- Level 3 nodes -->
  <circle cx="42" cy="138" r="10" fill="#1a1a2e" stroke="#41d1ff" stroke-width="1.2" opacity="0.5"/>
  <text x="42" y="143" text-anchor="middle" font-family="monospace" font-size="9" fill="#41d1ff" opacity="0.6">1</text>

  <circle cx="82" cy="138" r="10" fill="#1a1a2e" stroke="#41d1ff" stroke-width="1.2" opacity="0.5"/>
  <text x="82" y="143" text-anchor="middle" font-family="monospace" font-size="9" fill="#41d1ff" opacity="0.6">5</text>

  <circle cx="118" cy="138" r="10" fill="#1a1a2e" stroke="#bd34fe" stroke-width="1.2" opacity="0.5"/>
  <text x="118" y="143" text-anchor="middle" font-family="monospace" font-size="9" fill="#bd34fe" opacity="0.6">9</text>

  <circle cx="158" cy="138" r="10" fill="#1a1a2e" stroke="#bd34fe" stroke-width="1.2" opacity="0.5"/>
  <text x="158" y="143" text-anchor="middle" font-family="monospace" font-size="9" fill="#bd34fe" opacity="0.6">13</text>

  <!-- Label -->
  <text x="100" y="178" text-anchor="middle" font-family="monospace" font-size="11" font-weight="700" fill="url(#grad1)" opacity="0.9" letter-spacing="2">DAA</text>
</svg>
